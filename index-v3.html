<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinerPrices - ASIC Mining Profitability</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #FFD700;
            --secondary: #FFC107;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --border: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a1a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--card-bg) 0%, #0f0f0f 100%);
            border-bottom: 2px solid var(--primary);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        
        .btc-ticker {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 8px 16px;
            border-radius: 20px;
            color: #000;
            font-weight: 600;
            font-size: 13px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            transform: translateY(-2px);
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.4s;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* CARD */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.2);
        }
        
        .card h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* GRID */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        /* MINER CARD */
        .miner-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .miner-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.15);
        }
        
        .miner-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: var(--primary);
        }
        
        .miner-content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .miner-name {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .miner-spec {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        
        .miner-algo {
            background: rgba(255, 215, 0, 0.1);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            margin-top: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }
        
        /* SEARCH */
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            border: 2px solid var(--border);
            background: #0f0f0f;
            border-radius: 8px;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }
        
        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .spinner {
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .grid-4 { grid-template-columns: 1fr; }
            .header-content { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-coins"></i> MINERPRICES
            </div>
            <div class="btc-ticker">
                <i class="fab fa-bitcoin"></i> BTC: $<span id="btcPrice">--</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab('miners')">⛏️ ASIC Miners</button>
                <button class="nav-btn" onclick="switchTab('coins')">💰 Coins</button>
                <button class="nav-btn" onclick="switchTab('calculator')">🧮 Calculator</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- ASIC MINERS -->
        <div id="miners" class="tab-content active">
            <div class="card">
                <h2><i class="fas fa-list"></i> All ASIC Miners (Real-Time Data from WhatToMine)</h2>
                
                <div class="search-box">
                    <input type="text" id="minerSearch" placeholder="🔍 Search ASIC miners (e.g., Antminer S21)..." onkeyup="filterMiners()">
                </div>
                
                <div class="filter-group">
                    <span style="align-self: center; color: var(--text-secondary);">Filter by Algorithm:</span>
                    <button class="filter-btn active" onclick="filterByAlgorithm('')">All</button>
                    <button class="filter-btn" onclick="filterByAlgorithm('SHA-256')">SHA-256 (Bitcoin)</button>
                    <button class="filter-btn" onclick="filterByAlgorithm('Scrypt')">Scrypt (Litecoin)</button>
                    <button class="filter-btn" onclick="filterByAlgorithm('Blake3')">Blake3 (Alephium)</button>
                </div>
                
                <div id="minersList" class="grid-4">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading ASIC miners from WhatToMine...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- COINS -->
        <div id="coins" class="tab-content">
            <div class="card">
                <h2><i class="fas fa-coins"></i> Minable Coins (Live Prices)</h2>
                
                <div class="search-box">
                    <input type="text" id="coinSearch" placeholder="🔍 Search coins..." onkeyup="filterCoins()">
                </div>
                
                <div id="coinsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading coins from WhatToMine...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- CALCULATOR -->
        <div id="calculator" class="tab-content">
            <div class="card">
                <h2><i class="fas fa-calculator"></i> Mining Profitability Calculator</h2>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                    <div>
                        <label style="color: var(--text-secondary);">Select ASIC Miner</label>
                        <select id="calcMiner" style="width: 100%; padding: 10px; background: #0f0f0f; border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); margin-top: 8px;">
                            <option value="">Choose miner...</option>
                        </select>
                    </div>
                    
                    <div>
                        <label style="color: var(--text-secondary);">Electricity Cost ($/kWh)</label>
                        <input type="number" id="calcElec" value="0.08" step="0.01" style="width: 100%; padding: 10px; background: #0f0f0f; border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); margin-top: 8px;">
                    </div>
                    
                    <div style="display: flex; align-items: flex-end;">
                        <button onclick="calculateProfit()" style="width: 100%; padding: 10px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">
                            <i class="fas fa-play"></i> Calculate
                        </button>
                    </div>
                </div>
                
                <div id="calcResults" style="margin-top: 30px; display: none;">
                    <div style="background: rgba(255, 215, 0, 0.1); padding: 20px; border-radius: 10px; border: 1px solid var(--border);">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 12px; margin-bottom: 5px;">Daily Profit (USD)</div>
                                <div style="color: var(--primary); font-size: 24px; font-weight: 700;" id="resultDaily">$0.00</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 12px; margin-bottom: 5px;">Monthly Profit</div>
                                <div style="color: var(--primary); font-size: 24px; font-weight: 700;" id="resultMonth">$0.00</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 12px; margin-bottom: 5px;">Yearly Profit</div>
                                <div style="color: var(--primary); font-size: 24px; font-weight: 700;" id="resultYear">$0.00</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WhatToMine API endpoints (NO TOKEN REQUIRED)
        const WHATTOMINE_API = 'https://whattomine.com/api/v1';
        const COINGECKO_API = 'https://api.coingecko.com/api/v3';
        
        let allMiners = [];
        let allCoins = [];
        let btcPrice = 0;
        let selectedMiner = null;
        let currentAlgoFilter = '';

        // Initialize
        async function init() {
            console.log('Initializing MinerPrices with WhatToMine API...');
            await fetchBTCPrice();
            await fetchASICMiners();
            await fetchCoins();
            populateCalculatorSelects();
            setInterval(fetchBTCPrice, 300000); // Update BTC price every 5 minutes
        }

        // Fetch Bitcoin Price
        async function fetchBTCPrice() {
            try {
                const response = await fetch(`${COINGECKO_API}/simple/price?ids=bitcoin&vs_currencies=usd`);
                const data = await response.json();
                btcPrice = Math.round(data.bitcoin.usd);
                document.getElementById('btcPrice').textContent = btcPrice.toLocaleString();
            } catch (e) {
                console.log('BTC price fetch failed:', e.message);
            }
        }

        // Fetch ASIC Miners from WhatToMine
        async function fetchASICMiners() {
            try {
                console.log('Fetching ASIC miners from WhatToMine...');
                const response = await fetch(`${WHATTOMINE_API}/asics`);
                const data = await response.json();
                allMiners = data || [];
                console.log(`Loaded ${allMiners.length} ASIC miners`);
                displayMiners(allMiners);
            } catch (e) {
                console.error('Failed to fetch ASIC miners:', e.message);
                document.getElementById('minersList').innerHTML = `<p style="color: var(--danger);">Error loading miners: ${e.message}</p>`;
            }
        }

        // Fetch Coins from WhatToMine
        async function fetchCoins() {
            try {
                console.log('Fetching coins from WhatToMine...');
                const response = await fetch(`${WHATTOMINE_API}/coins`);
                const data = await response.json();
                allCoins = data || [];
                console.log(`Loaded ${allCoins.length} coins`);
                displayCoins(allCoins);
            } catch (e) {
                console.error('Failed to fetch coins:', e.message);
                document.getElementById('coinsList').innerHTML = `<p style="color: var(--danger);">Error loading coins: ${e.message}</p>`;
            }
        }

        // Display ASIC Miners
        function displayMiners(miners) {
            const list = document.getElementById('minersList');
            
            if (!miners || miners.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary);">No miners found.</p>';
                return;
            }
            
            list.innerHTML = miners.map(miner => {
                const mainAlgo = miner.algorithms && miner.algorithms[0] ? miner.algorithms[0].name : 'Unknown';
                const hashrate = miner.algorithms && miner.algorithms[0] ? formatHashrate(miner.algorithms[0].hashrate) : 'N/A';
                const power = miner.algorithms && miner.algorithms[0] ? miner.algorithms[0].power : 'N/A';
                
                return `
                    <div class="miner-card" onclick="selectMiner('${miner.id}', '${miner.name.replace(/'/g, "\\'")}')">
                        <div class="miner-image">⛏️</div>
                        <div class="miner-content">
                            <div class="miner-name">${miner.name}</div>
                            <div class="miner-spec">
                                <span>Hash Rate:</span>
                                <span>${hashrate}</span>
                            </div>
                            <div class="miner-spec">
                                <span>Power:</span>
                                <span>${power}W</span>
                            </div>
                            <div class="miner-algo">${mainAlgo}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Format hashrate for display
        function formatHashrate(hashrate) {
            if (!hashrate) return 'N/A';
            
            const th = hashrate / 1e12;
            if (th >= 1) return (th).toFixed(2) + ' TH/s';
            
            const gh = hashrate / 1e9;
            if (gh >= 1) return (gh).toFixed(2) + ' GH/s';
            
            const mh = hashrate / 1e6;
            return (mh).toFixed(2) + ' MH/s';
        }

        // Display Coins
        function displayCoins(coins) {
            const list = document.getElementById('coinsList');
            
            if (!coins || coins.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary);">No coins found.</p>';
                return;
            }
            
            list.innerHTML = coins.filter(c => c.exchanges && c.exchanges[0]).map(coin => {
                const price = coin.exchanges[0].price || 0;
                const algo = coin.algorithm || 'Unknown';
                
                return `
                    <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                            <div>
                                <strong style="color: var(--primary); font-size: 14px;">${coin.name}</strong>
                                <div style="color: var(--text-secondary); font-size: 12px;">${coin.tag}</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="color: var(--primary); font-weight: 700;">$${price.toFixed(2)}</div>
                                <div style="color: var(--text-secondary); font-size: 11px;">${algo}</div>
                            </div>
                        </div>
                        <div style="border-top: 1px solid var(--border); padding-top: 10px; font-size: 11px; color: var(--text-secondary);">
                            <div style="margin-bottom: 4px;">Difficulty: ${formatNumber(coin.difficulty)}</div>
                            <div>Net Hash: ${formatNumber(coin.nethash)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Format large numbers
        function formatNumber(num) {
            if (!num) return 'N/A';
            if (num >= 1e18) return (num / 1e18).toFixed(2) + 'E';
            if (num >= 1e15) return (num / 1e15).toFixed(2) + 'P';
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'G';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            return num.toFixed(0);
        }

        // Select Miner
        function selectMiner(minerId, minerName) {
            selectedMiner = allMiners.find(m => m.id == minerId);
            document.getElementById('calcMiner').value = minerId;
        }

        // Populate calculator selects
        function populateCalculatorSelects() {
            const sel = document.getElementById('calcMiner');
            sel.innerHTML = '<option value="">Choose miner...</option>' + allMiners.map(m => 
                `<option value="${m.id}">${m.name}</option>`
            ).join('');
        }

        // Filter miners
        function filterMiners() {
            const search = document.getElementById('minerSearch').value.toLowerCase();
            const filtered = allMiners.filter(m => 
                m.name.toLowerCase().includes(search) &&
                (currentAlgoFilter === '' || (m.algorithms && m.algorithms[0] && m.algorithms[0].name === currentAlgoFilter))
            );
            displayMiners(filtered);
        }

        // Filter by algorithm
        function filterByAlgorithm(algo) {
            currentAlgoFilter = algo;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            filterMiners();
        }

        // Filter coins
        function filterCoins() {
            const search = document.getElementById('coinSearch').value.toLowerCase();
            const filtered = allCoins.filter(c => 
                c.name.toLowerCase().includes(search) || c.tag.toLowerCase().includes(search)
            );
            displayCoins(filtered);
        }

        // Calculate Profit
        function calculateProfit() {
            const minerId = document.getElementById('calcMiner').value;
            const elec = parseFloat(document.getElementById('calcElec').value);
            
            if (!minerId) return alert('Select a miner');
            
            const miner = allMiners.find(m => m.id == minerId);
            if (!miner || !miner.algorithms || !miner.algorithms[0]) return alert('Invalid miner');
            
            const algo = miner.algorithms[0];
            const hashrate = algo.hashrate || 0;
            const power = algo.power || 0;
            
            // Simple profitability calculation
            // For SHA256 Bitcoin
            const networkHashrate = 650e18; // 650 EH/s Bitcoin network
            const bitcoinReward = 6.25;
            const blockTime = 600; // seconds
            
            const dailyBTC = (hashrate / networkHashrate) * (86400 / blockTime) * bitcoinReward;
            const dailyUSD = dailyBTC * btcPrice;
            const costUSD = (power / 1000) * 24 * elec;
            const profitDaily = dailyUSD - costUSD;
            
            document.getElementById('resultDaily').textContent = '$' + profitDaily.toFixed(2);
            document.getElementById('resultMonth').textContent = '$' + (profitDaily * 30).toFixed(2);
            document.getElementById('resultYear').textContent = '$' + (profitDaily * 365).toFixed(2);
            document.getElementById('calcResults').style.display = 'block';
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target?.classList.add('active');
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>

</body>
</html>
