<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Miner Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 {
            color: #FFD700;
        }
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
        }
        .miner-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        button {
            background: #FFD700;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #FFC107;
        }
    </style>
</head>
<body>
    <h1>⛏️ Miner Image Generator</h1>
    <p>Generate professional placeholder images for ASIC miners</p>
    
    <div class="images-grid" id="imagesContainer"></div>

    <script>
        const miners = [
            'Antminer Z15 Pro',
            'Antminer Z15',
            'Antminer S23 Hyd 3U',
            'Whatsminer M79S',
            'Antminer L7',
            'Antminer S19 Pro Hyd',
            'Antminer S19 Pro',
            'Antminer S19',
            'Antminer T19',
            'Antminer A11 Pro',
            'Antminer D7',
            'Whatsminer M21S',
            'Whatsminer M30S++',
            'Innosilicon A11 Pro',
            'AvalonMiner 1246',
            'Canaan Avalon A1246',
            'StrongU STX1',
            'Bitmain Antminer K7'
        ];

        const algorithmColors = {
            'Equihash': '#00D4FF',
            'SHA256': '#FF6B00',
            'Scrypt': '#00FF00',
            'X11': '#9D4EDD',
            'Cuckatoo': '#FFB703',
            'CryptoNightR': '#FB5607',
        };

        function generateMinerImage(minerName, canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 400;

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 400, 400);
            gradient.addColorStop(0, '#0f0f0f');
            gradient.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 400, 400);

            // Border
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.roundRect(10, 10, 380, 380, 15);
            ctx.stroke();

            // Algorithm color
            const algoColor = Object.values(algorithmColors)[Math.floor(Math.random() * Object.keys(algorithmColors).length)];
            
            // Draw ASIC representation (simplified circuit board)
            ctx.fillStyle = algoColor;
            ctx.globalAlpha = 0.3;
            
            // Rectangles for circuits
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(50 + i * 70, 80, 50, 50);
            }
            
            // Circles for components
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#FFD700';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 3; j++) {
                    ctx.beginPath();
                    ctx.arc(70 + i * 80, 200 + j * 50, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            ctx.globalAlpha = 1;

            // Text
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('⛏️', 200, 150);

            ctx.fillStyle = '#FFC107';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            
            // Split long names
            const words = minerName.split(' ');
            let y = 320;
            let lineHeight = 20;
            
            for (let i = 0; i < words.length; i++) {
                ctx.fillText(words[i], 200, y);
                y += lineHeight;
            }

            // Download button
            setTimeout(() => {
                const downloadBtn = document.getElementById(canvasId + '-download');
                if (downloadBtn) {
                    downloadBtn.onclick = () => {
                        const link = document.createElement('a');
                        link.download = `${minerName.toLowerCase().replace(/\s+/g, '-')}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    };
                }
            }, 100);
        }

        // Generate all images
        const container = document.getElementById('imagesContainer');
        miners.forEach((miner, i) => {
            const canvasId = `canvas-${i}`;
            const html = `
                <div class="image-card">
                    <div class="miner-name">${miner}</div>
                    <canvas id="${canvasId}"></canvas>
                    <button id="${canvasId}-download">Download Image</button>
                </div>
            `;
            container.innerHTML += html;
            
            // Generate image
            setTimeout(() => generateMinerImage(miner, canvasId), i * 100);
        });

        // Polyfill for roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                const radii = [radius, radius, radius, radius];
                this.beginPath();
                this.moveTo(x + radii[0], y);
                this.lineTo(x + width - radii[1], y);
                this.quadraticCurveTo(x + width, y, x + width, y + radii[1]);
                this.lineTo(x + width, y + height - radii[2]);
                this.quadraticCurveTo(x + width, y + height, x + width - radii[2], y + height);
                this.lineTo(x + radii[3], y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radii[3]);
                this.lineTo(x, y + radii[0]);
                this.quadraticCurveTo(x, y, x + radii[0], y);
                this.closePath();
            };
        }
    </script>
</body>
</html>
