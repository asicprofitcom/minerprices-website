<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinerPrices - ASIC Miner Profitability</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #FFD700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        
        th {
            background: #FFD700;
            color: #000;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        tr:hover {
            background: #222;
        }
        
        .price {
            color: #4ade80;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .error {
            background: #ef4444;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #1a1a1a;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-box h3 {
            color: #FFD700;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛏️ MinerPrices - Live ASIC Miner Profitability</h1>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Total Miners</h3>
                <div class="value" id="minerCount">0</div>
            </div>
            <div class="stat-box">
                <h3>Top Daily Profit</h3>
                <div class="value" id="topProfit">$0</div>
            </div>
            <div class="stat-box">
                <h3>Bitcoin Price</h3>
                <div class="value" id="btcPrice">$0</div>
            </div>
            <div class="stat-box">
                <h3>Last Updated</h3>
                <div class="value" id="lastUpdate">--:--</div>
            </div>
        </div>
        
        <div id="table-container">
            <div class="loading">Loading miners from database...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://huzfnrgfcxlwvmrkoyge.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_s5ocl3sDwpefFYuw3V-JEQ_FQzXGTHZ';
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadMiners() {
            try {
                console.log('Loading miners from Supabase...');
                console.log('URL:', SUPABASE_URL);
                console.log('Supabase object:', supabase);
                
                // Fetch miners from Supabase
                const { data, error } = await supabase
                    .from('miners')
                    .select('*')
                    .order('daily_profit', { ascending: false });

                console.log('Response - Data:', data, 'Error:', error);

                if (error) {
                    throw error;
                }

                if (!data || data.length === 0) {
                    document.getElementById('table-container').innerHTML = 
                        '<div class="error">No miners in database (0 records found). Please run the fetch script.</div>';
                    console.log('No data returned');
                    return;
                }
                
                console.log('Loaded', data.length, 'miners');

                // Update stats
                document.getElementById('minerCount').textContent = data.length;
                if (data[0]) {
                    document.getElementById('topProfit').textContent = '$' + data[0].daily_profit.toFixed(2);
                    document.getElementById('btcPrice').textContent = '$' + Math.round(data[0].btc_price);
                    const updated = new Date(data[0].updated_at);
                    document.getElementById('lastUpdate').textContent = updated.toLocaleTimeString();
                }

                // Create table
                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Miner Name</th>
                                <th>Algorithm</th>
                                <th>Coin</th>
                                <th>Hashrate</th>
                                <th>Power (W)</th>
                                <th>💰 Daily Profit</th>
                                <th>Monthly</th>
                                <th>Yearly</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach((miner, i) => {
                    html += `
                        <tr>
                            <td>#${i + 1}</td>
                            <td>${miner.name}</td>
                            <td>${miner.algorithm}</td>
                            <td>${miner.coin}</td>
                            <td>${formatHashrate(miner.hashrate)}</td>
                            <td>${miner.power}</td>
                            <td class="price">$${miner.daily_profit.toFixed(2)}</td>
                            <td class="price">$${miner.monthly_profit.toFixed(2)}</td>
                            <td class="price">$${miner.yearly_profit.toFixed(2)}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                document.getElementById('table-container').innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('table-container').innerHTML = 
                    `<div class="error">Error loading miners: ${error.message}</div>`;
            }
        }

        function formatHashrate(hashrate) {
            if (hashrate >= 1e15) return (hashrate / 1e15).toFixed(2) + ' PH/s';
            if (hashrate >= 1e12) return (hashrate / 1e12).toFixed(2) + ' TH/s';
            if (hashrate >= 1e9) return (hashrate / 1e9).toFixed(2) + ' GH/s';
            if (hashrate >= 1e6) return (hashrate / 1e6).toFixed(2) + ' MH/s';
            return hashrate.toFixed(2) + ' H/s';
        }

        // Load on page load
        window.addEventListener('load', loadMiners);
    </script>
</body>
</html>
